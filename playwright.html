<!DOCTYPE html>
<html>
<head>
    <title>Playwright Test Page</title>
    <style>
        body { font-family: Arial; background: #eef; padding: 20px; }
        h1 { color: #333; }
        input, button { padding: 8px; margin: 5px 0; width: 100%; }
        #message { font-weight: bold; margin-top: 10px; }
        table, th, td { border: 1px solid black; border-collapse: collapse; padding: 5px; margin-top: 20px; }
    </style>
    <script>
        function login() {
            let u = document.getElementById("username").value;
            let p = document.getElementById("password").value;
            document.getElementById("message").innerText = (u === "admin" && p === "admin123") ? "Login Successful" : "Invalid Credentials";
        }
    </script>
</head>
<body>
    <h1>Playwright Automation Page</h1>
    <label>Username:</label>
    <input id="username" type="text" placeholder="Enter username">
    <label>Password:</label>
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <p id="message"></p>

    <table>
        <tr><th>ID</th><th>Name</th><th>Role</th></tr>
        <tr><td>1</td><td>Kiran</td><td>QA</td></tr>
        <tr><td>2</td><td>Ravi</td><td>Developer</td></tr>
    </table>
</body>
</html>
