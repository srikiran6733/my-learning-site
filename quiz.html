<!DOCTYPE html>
<html>
<head>
  <title>Snowflake Exam Platform</title>
  <style>
    body { font-family: Arial; background:#1d2a35; color:white; text-align:center; }
    .option { background:#2f3e46; margin:10px auto; padding:10px; width:300px; cursor:pointer; }
    .correct { background:green; }
    .wrong { background:red; }
    .btn { padding:10px; margin:10px; background:#04AA6D; border:none; color:white; }
  </style>
</head>

<body>

<h2>Snowflake Quiz</h2>

<!-- FILTER UI -->
<div>
  Category:
  <select id="category">
    <option value="All">All</option>
    <option value="Snowflake">Snowflake</option>
  </select>

  Difficulty:
  <select id="difficulty">
    <option value="All">All</option>
    <option value="Beginner">Beginner</option>
    <option value="Intermediate">Intermediate</option>
  </select>

  <button class="btn" onclick="startQuiz()">Start Quiz</button>
</div>

<hr>

<div id="qno"></div>
<div id="question"></div>
<div id="options"></div>

<button class="btn" onclick="prevQuestion()">Previous</button>
<button class="btn" onclick="nextQuestion()">Next</button>

<div id="result"></div>

<script>
let allQuestions = [];
let quiz = [];
let answers = [];
let current = 0;

// Load JSON
fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    allQuestions = data;
  });

// Start Quiz
function startQuiz() {
  const cat = document.getElementById("category").value;
  const diff = document.getElementById("difficulty").value;

  quiz = allQuestions.filter(q => {
    return (cat === "All" || q.category === cat) &&
           (diff === "All" || q.difficulty === diff);
  });

  if (quiz.length === 0) {
    alert("No questions found!");
    return;
  }

  current = 0;
  answers = new Array(quiz.length).fill(null);
  loadQuestion();
}

// Load Question
function loadQuestion() {
  document.getElementById("qno").innerText = "Question " + (current + 1);
  document.getElementById("question").innerText = quiz[current].question;

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  quiz[current].options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.classList.add("option");
    div.innerText = opt;

    if (answers[current] !== null) {
      if (i === quiz[current].answer) div.classList.add("correct");
      else if (i === answers[current]) div.classList.add("wrong");
    }

    div.onclick = () => {
      answers[current] = i;
      loadQuestion();
    };

    optDiv.appendChild(div);
  });
}

// Navigation
function nextQuestion() {
  if (current < quiz.length - 1) current++;
  else showResult();
  loadQuestion();
}

function prevQuestion() {
  if (current > 0) current--;
  loadQuestion();
}

// Result
function showResult() {
  let score = 0;
  answers.forEach((a, i) => {
    if (a === quiz[i].answer) score++;
  });

  document.getElementById("result").innerText =
    "Score: " + score + "/" + quiz.length;
}
</script>

</body>
</html>
