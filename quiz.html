<!DOCTYPE html>
<html>
<head>
  <title>Snowflake Exam Platform</title>

  <style>
    body {
      font-family: Arial;
      background: #1d2a35;
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
    }

    select, .btn {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    .btn {
      background: #04AA6D;
      color: white;
      cursor: pointer;
    }

    .option {
      background: #2f3e46;
      margin: 10px auto;
      padding: 12px;
      width: 320px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: #3a4f57;
    }

    .correct {
      background: green;
    }

    .wrong {
      background: red;
    }

    #question {
      font-size: 22px;
      margin: 20px;
    }
  </style>
</head>
<body>

<!-- NAVBAR (FIXED & VISIBLE) -->
<div style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#0f172a;
  position:sticky;
  top:0;
  z-index:1000;
">

  <div style="font-size:20px; font-weight:bold;">
    My Learning Site
  </div>

  <div>
    <a href="index.html" style="color:white; margin:10px; text-decoration:none;">🏠 Home</a>
    <a href="html.html" style="color:white; margin:10px; text-decoration:none;">HTML</a>
    <a href="css.html" style="color:white; margin:10px; text-decoration:none;">CSS</a>
    <a href="javascript.html" style="color:white; margin:10px; text-decoration:none;">JS</a>
    <a href="python.html" style="color:white; margin:10px; text-decoration:none;">Python</a>
    <a href="java.html" style="color:white; margin:10px; text-decoration:none;">Java</a>
  </div>

</div>
<!-- FILTERS -->
<div>
  Category:
  <select id="category">
    <option value="All">All</option>
    <option value="Snowflake">Snowflake</option>
  </select>

  Difficulty:
  <select id="difficulty">
    <option value="All">All</option>
    <option value="Beginner">Beginner</option>
    <option value="Intermediate">Intermediate</option>
  </select>

  <button class="btn" onclick="startQuiz()">Start Quiz</button>
</div>

<!-- PROGRESS BAR -->
<div style="width: 80%; margin: 20px auto;">
  <div id="progressText"></div>
  <div style="background:#444; height:20px; border-radius:10px;">
    <div id="progressBar" style="height:20px; width:0%; background:#04AA6D; border-radius:10px;"></div>
  </div>
</div>

<hr>

<div id="qno"></div>
<div id="question"></div>
<div id="options"></div>

<button class="btn" onclick="prevQuestion()">Previous</button>
<button class="btn" onclick="nextQuestion()">Next</button>

<div id="result"></div>

<script>
let allQuestions = [];
let quiz = [];
let answers = [];
let current = 0;

// Load JSON
fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    allQuestions = data;
  });

// Start Quiz
function startQuiz() {
  const cat = document.getElementById("category").value;
  const diff = document.getElementById("difficulty").value;

  quiz = allQuestions.filter(q => {
    return (cat === "All" || q.category === cat) &&
           (diff === "All" || q.difficulty === diff);
  });

  if (quiz.length === 0) {
    alert("No questions found!");
    return;
  }

  current = 0;
  answers = new Array(quiz.length).fill(null);

  loadQuestion();
}

// Load Question
function loadQuestion() {

  // Progress
  document.getElementById("progressText").innerText =
    "Question " + (current + 1) + " / " + quiz.length;

  document.getElementById("progressBar").style.width =
    ((current + 1) / quiz.length) * 100 + "%";

  document.getElementById("qno").innerText = "Question " + (current + 1);
  document.getElementById("question").innerText = quiz[current].question;

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  quiz[current].options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.classList.add("option");
    div.innerText = opt;

    if (answers[current] !== null) {
      if (i === quiz[current].answer) div.classList.add("correct");
      else if (i === answers[current]) div.classList.add("wrong");
    }

    div.onclick = () => {
      answers[current] = i;
      loadQuestion();
    };

    optDiv.appendChild(div);
  });
}

// Navigation
function nextQuestion() {
  if (current < quiz.length - 1) {
    current++;
    loadQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

// Result
function showResult() {
  let score = 0;

  answers.forEach((a, i) => {
    if (a === quiz[i].answer) score++;
  });

  let percentage = Math.round((score / quiz.length) * 100);

  document.getElementById("question").innerText = "Quiz Completed 🎉";
  document.getElementById("options").innerHTML = "";

  document.getElementById("result").innerHTML =
    "Score: " + score + "/" + quiz.length + "<br>" +
    "Percentage: " + percentage + "%";
}
</script>

</body>
</html>
